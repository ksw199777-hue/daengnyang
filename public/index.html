<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>이제댕냥</title>
</head>
<body>
<script>
  (function () {
    var path = window.location.pathname;
    var playStoreUrl = 'https://play.google.com/store/apps/details?id=com.daengnyang';

    // intent:// 스킴: 앱 설치 시 앱 실행, 미설치 시 S.browser_fallback_url(플레이스토어)로 자동 이동
    var intentUrl =
      'intent://daengnyang-c80e5.web.app' + path +
      '#Intent' +
      ';scheme=https' +
      ';package=com.daengnyang' +
      ';S.browser_fallback_url=' + encodeURIComponent(playStoreUrl) +
      ';end';

    if (/android/i.test(navigator.userAgent)) {
      window.location.replace(intentUrl);
    } else {
      window.location.replace(playStoreUrl);
    }
  })();
</script>
<noscript>
  <meta http-equiv="refresh" content="0; url=https://play.google.com/store/apps/details?id=com.daengnyang">
</noscript>
</body>
</html>
